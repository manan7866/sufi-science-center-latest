# ============================================================
# Sufi Science Center - Production Docker Compose
# Designed for CI/CD Pipeline (GitHub Actions → Docker Hub → Server)
# ============================================================

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:17-alpine
    container_name: ssc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sufisciencecenter}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sufisciencecenter}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ssc-network

  # ============================================================
  # Database Migration (runs once then exits)
  # ============================================================
  # migrate:
  #   image: ${DOCKERHUB_USERNAME:-sufisciencecenter}/ssc-app:latest
  #   container_name: ssc-migrate
  #   entrypoint: sh
  #   environment:
  #     - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sufisciencecenter}
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - ssc-network
  #   command: >
  #     -c "
  #       echo '⏳ Waiting for database connection...' &&
  #       sleep 5 &&
  #       echo '📋 Pushing Prisma schema...' &&
  #       npx prisma db push --accept-data-loss &&
  #       echo '✅ Schema synced!' &&
  #       echo '🌱 Seeding foundations data (lineages, regions, themes, saints)...' &&
  #       npx tsx prisma/seed-foundations.ts &&
  #       echo '🌱 Seeding inner development data...' &&
  #       npx tsx prisma/seed-inner-development.ts &&
  #       echo '✅ All foundation data seeded successfully!'
  #     "
  #   restart: "no"

  # ============================================================
  # Next.js Application (from Docker Hub)
  # ============================================================
  app:
    image: ${DOCKERHUB_USERNAME:-sufisciencecenter}/ssc-app:latest
    container_name: ssc-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3010}:3010"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sufisciencecenter}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3010/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
    driver: local

networks:
  ssc-network:
    driver: bridge
